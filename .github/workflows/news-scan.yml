name: News Sentiment Scan

on:
  # Auto-run after every successful stock scan completes
  workflow_run:
    workflows: ["Stock RS Leader Scan"]
    types: [completed]

  # On-demand trigger
  workflow_dispatch:

permissions:
  contents: write   # write back news_sentiment.json

jobs:
  news:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Only run when the triggering scan succeeded (or manual)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout (latest — scan just committed)
        uses: actions/checkout@v4
        with:
          ref: main

      # Python for yfinance news fetch (Yahoo blocks node-fetch on news endpoint)
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install yfinance pandas

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node deps
        run: npm install node-fetch
        working-directory: scripts

      # Step A: Python pre-fetches news headlines via yfinance
      - name: Fetch US news via Python yfinance
        run: python scripts/fetch_news.py us

      - name: Fetch TW news via Python yfinance
        run: python scripts/fetch_news.py tw
        continue-on-error: true  # TW news may be sparse; don't kill workflow

      # Step B: Node sends headlines to Claude for sentiment classification
      - name: Run news sentiment scan (US)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/news_scan.js us

      - name: Run news sentiment scan (TW)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/news_scan.js tw
        continue-on-error: true  # TW news fetching may yield empty results

      - name: Commit news sentiment
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          [ -f data/us_news_sentiment.json ] && git add data/us_news_sentiment.json || true
          [ -f data/tw_news_sentiment.json ] && git add data/tw_news_sentiment.json || true
          [ -f data/us_news_raw.json ]       && git add data/us_news_raw.json       || true
          [ -f data/tw_news_raw.json ]       && git add data/tw_news_raw.json       || true
          git diff --cached --quiet || git commit -m "news: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase --autostash || true
          git push
