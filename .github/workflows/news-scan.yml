name: News Sentiment Scan

on:
  # Auto-run after every successful stock scan completes
  workflow_run:
    workflows: ["Stock RS Leader Scan"]
    types: [completed]

  # On-demand trigger
  workflow_dispatch:

permissions:
  contents: write   # write back news_sentiment.json

jobs:
  news:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # 2026-05-29: 只在「cron 自動掃描」或「手動 dispatch news-scan」時跑 AI 串接。
    # 若上游 stock-scan 是被「手動 workflow_dispatch」觸發的（= 使用者按網站「完整重掃」），
    # 則跳過 AI（news/ai_analysis/narrative）→ 手動重掃只重算排名，不打 Claude API = $0。
    # AI 分析維持 cron 一天 3 次自動更新即可。
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'schedule')

    steps:
      - name: Checkout (latest — scan just committed)
        uses: actions/checkout@v4
        with:
          ref: main

      # Python for yfinance news fetch (Yahoo blocks node-fetch on news endpoint)
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install yfinance pandas

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node deps
        run: npm install node-fetch
        working-directory: scripts

      # Step A: Python pre-fetches news headlines via yfinance
      - name: Fetch US news via Python yfinance
        run: python scripts/fetch_news.py us

      - name: Fetch TW news via Python yfinance
        run: python scripts/fetch_news.py tw
        continue-on-error: true  # TW news may be sparse; don't kill workflow

      # 2026-06-09 新聞頁分類動態(綜合/美股/台股/加密)— 伺服器端抓 Google News RSS,
      # 取代壞掉的瀏覽器 CORS proxy(worker 403、台股 RSS 全被 CORS 擋)。stdlib only,無新依賴。
      - name: Fetch category news feed (server-side, no proxy)
        run: python scripts/fetch_news_feed.py
        continue-on-error: true

      # Step B: Node sends headlines to Claude for sentiment classification
      - name: Run news sentiment scan (US)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/news_scan.js us

      - name: Run news sentiment scan (TW)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/news_scan.js tw
        continue-on-error: true  # TW news fetching may yield empty results

      - name: Commit news sentiment
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          [ -f data/us_news_sentiment.json ] && git add data/us_news_sentiment.json || true
          [ -f data/tw_news_sentiment.json ] && git add data/tw_news_sentiment.json || true
          [ -f data/us_news_raw.json ]       && git add data/us_news_raw.json       || true
          [ -f data/tw_news_raw.json ]       && git add data/tw_news_raw.json       || true
          [ -f data/news_feed.json ]         && git add data/news_feed.json         || true
          [ -f data/api_usage.json ]         && git add data/api_usage.json         || true
          git diff --cached --quiet || git commit -m "news: $(date -u '+%Y-%m-%d %H:%M UTC')"
          # Push with retry — workflows race on main
          for attempt in 1 2 3 4 5; do
            git pull --rebase --autostash 2>&1 | tail -2 || true
            if git push 2>&1; then echo "✅ push ok attempt $attempt"; break; fi
            sleep $((attempt * 2))
          done
