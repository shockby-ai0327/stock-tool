name: AI Stock Forward Analysis

on:
  # Auto-run AFTER News Sentiment Scan completes — ensures news data is
  # fresh when ai_analysis.js builds catalyst-aware prompts.
  # Chain: Stock Scan → News Scan → AI Analysis (this) → Backtest (separate)
  workflow_run:
    workflows: ["News Sentiment Scan"]
    types: [completed]

  # On-demand trigger (for testing / manual refresh)
  workflow_dispatch:
    inputs:
      market:
        description: 'Market to analyze: us / tw / all'
        required: false
        default: 'us'

permissions:
  contents: write   # write back analysis results to data/

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Run regardless of news-scan outcome — fresh news is preferred but not required.
    # If news-scan fails, ai_analysis still works using older cached news data.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success' ||
      github.event.workflow_run.conclusion == 'failure'

    steps:
      - name: Checkout (always use latest — scan just committed)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch
        working-directory: scripts

      - name: Analyze US leaders
        if: ${{ github.event.inputs.market != 'tw' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/ai_analysis.js us

      - name: Generate US market narrative
        if: ${{ github.event.inputs.market != 'tw' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/market_narrative.js us

      # 2026-05-19 fix: same pattern as US — runs by default for workflow_run
      # (where inputs.market is undefined). Only skipped when user explicitly
      # dispatches with market=us.
      - name: Analyze TW leaders
        if: ${{ github.event.inputs.market != 'us' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/ai_analysis.js tw

      - name: Generate TW market narrative
        if: ${{ github.event.inputs.market != 'us' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/market_narrative.js tw

      - name: Commit analysis results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 2026-05-19 FIX: git add aborts on first missing pathspec, leaving
          # OTHER files unstaged. Add each file individually so missing TW files
          # don't kill US staging.
          for f in data/us_ai_analysis.json data/tw_ai_analysis.json data/us_market_narrative.json data/tw_market_narrative.json; do
            [ -f "$f" ] && git add "$f" || true
          done
          git diff --cached --quiet && echo "(no AI changes to commit)" || git commit -m "ai: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase --autostash 2>&1 | tail -3 || true
          git push
