name: AI Stock Forward Analysis

on:
  # 2026-06-30: 改為「只在使用者開網站時」按需觸發 — 前端用 PAT 打 workflow_dispatch。
  # 移除了原本的 workflow_run 自動串接（News Scan 跑完就接力），那是「人不在也照打 Claude」
  # 的花費來源。現在市場敘事 + 個股 AI 判讀都是 on-demand：開站才生成那天的，離開期間零 API。
  # 注意：backtest.yml 串接的是「Stock RS Leader Scan」不是本工作流，移除這裡不影響回測。
  workflow_dispatch:
    inputs:
      market:
        description: 'Market to analyze: us / tw / all'
        required: false
        default: 'us'
      days:
        description: 'Days since last visit (>=2 ⇒ generate catch-up recap)'
        required: false
        default: '1'

permissions:
  contents: write   # write back analysis results to data/

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout (always use latest — scan just committed)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch
        working-directory: scripts

      - name: Analyze US leaders
        if: ${{ github.event.inputs.market != 'tw' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/ai_analysis.js us

      - name: Generate US market narrative
        if: ${{ github.event.inputs.market != 'tw' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/market_narrative.js us ${{ github.event.inputs.days || '1' }}

      # 前端按市場觸發：dispatch 時帶 market=us 或 tw，只生成「正在看的那個市場」省一半。
      # 預設 default='us' ⇒ 不帶 market 的手動 dispatch 只跑美股（跟原本一致）。
      - name: Analyze TW leaders
        if: ${{ github.event.inputs.market != 'us' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/ai_analysis.js tw

      - name: Generate TW market narrative
        if: ${{ github.event.inputs.market != 'us' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/market_narrative.js tw ${{ github.event.inputs.days || '1' }}

      - name: Commit analysis results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 2026-05-19 FIX: git add aborts on first missing pathspec, leaving
          # OTHER files unstaged. Add each file individually so missing TW files
          # don't kill US staging.
          for f in data/us_ai_analysis.json data/tw_ai_analysis.json data/us_market_narrative.json data/tw_market_narrative.json data/api_usage.json; do
            [ -f "$f" ] && git add "$f" || true
          done
          git diff --cached --quiet && echo "(no AI changes to commit)" || git commit -m "ai: $(date -u '+%Y-%m-%d %H:%M UTC')"
          # Push with retry — parallel workflows (backtest, news, insider) can
          # push between our fetch and push, leaving us with stale remote ref.
          for attempt in 1 2 3 4 5; do
            git pull --rebase --autostash 2>&1 | tail -2 || true
            if git push 2>&1; then
              echo "✅ push succeeded on attempt $attempt"
              break
            fi
            echo "⚠ push failed, attempt $attempt — retrying after pull..."
            sleep $((attempt * 2))
          done
