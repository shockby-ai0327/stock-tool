name: AI Stock Forward Analysis

on:
  # Auto-run AFTER News Sentiment Scan completes — ensures news data is
  # fresh when ai_analysis.js builds catalyst-aware prompts.
  # Chain: Stock Scan → News Scan → AI Analysis (this) → Backtest (separate)
  workflow_run:
    workflows: ["News Sentiment Scan"]
    types: [completed]

  # On-demand trigger (for testing / manual refresh)
  workflow_dispatch:
    inputs:
      market:
        description: 'Market to analyze: us / tw / all'
        required: false
        default: 'us'

permissions:
  contents: write   # write back analysis results to data/

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Run regardless of news-scan outcome — fresh news is preferred but not required.
    # If news-scan fails, ai_analysis still works using older cached news data.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success' ||
      github.event.workflow_run.conclusion == 'failure'

    steps:
      - name: Checkout (always use latest — scan just committed)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch
        working-directory: scripts

      - name: Analyze US leaders
        if: ${{ github.event.inputs.market != 'tw' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/ai_analysis.js us

      - name: Generate US market narrative
        if: ${{ github.event.inputs.market != 'tw' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/market_narrative.js us

      - name: Analyze TW leaders
        if: ${{ github.event.inputs.market == 'tw' || github.event.inputs.market == 'all' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/ai_analysis.js tw

      - name: Generate TW market narrative
        if: ${{ github.event.inputs.market == 'tw' || github.event.inputs.market == 'all' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/market_narrative.js tw

      - name: Commit analysis results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "=== Files written by AI scripts ==="
          ls -la data/us_ai_analysis.json data/us_market_narrative.json 2>&1 || true
          echo "=== Content size ==="
          wc -c data/us_ai_analysis.json data/us_market_narrative.json 2>&1 || true
          echo "=== git status BEFORE add ==="
          git status --short data/
          git add data/us_ai_analysis.json data/tw_ai_analysis.json data/us_market_narrative.json data/tw_market_narrative.json 2>&1 || true
          echo "=== git status AFTER add ==="
          git status --short data/
          echo "=== diff cached check ==="
          git diff --cached --stat
          git diff --cached --quiet && echo "(no staged changes)" || git commit -m "ai: $(date -u '+%Y-%m-%d %H:%M UTC')"
          # Pull latest before push to avoid race conditions with scan/backtest workflows
          git pull --rebase --autostash 2>&1 | tail -3 || true
          git push 2>&1
