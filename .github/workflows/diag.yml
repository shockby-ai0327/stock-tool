name: Yahoo Diagnostic

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
        working-directory: scripts
      - run: node scripts/yahoo_diag.js
