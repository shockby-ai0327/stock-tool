name: Backtest Signal History

on:
  # Auto-run after every successful stock scan
  workflow_run:
    workflows: ["Stock RS Leader Scan"]
    types: [completed]

  # On-demand
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 12

    steps:
      - name: Checkout (always use latest — scan just committed)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch
        working-directory: scripts

      - name: Run backtest update
        run: node scripts/backtest.js

      - name: Commit signal history + stats
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 2026-05-19 FIX: add files individually so missing one doesn't abort all
          [ -f data/signal_history.json ] && git add data/signal_history.json || true
          [ -f data/signal_stats.json ]   && git add data/signal_stats.json   || true
          git diff --cached --quiet && echo "(no backtest changes)" || git commit -m "backtest: $(date -u '+%Y-%m-%d %H:%M UTC')"
          # FIX: pull --rebase before push to avoid race with parallel workflows
          # (backtest, news-scan, ai-analysis all triggered by stock-scan completion)
          git pull --rebase --autostash 2>&1 | tail -3 || true
          git push
