name: Stock RS Leader Scan

on:
  schedule:
    - cron: '25 13 * * 1-5'   # 09:25 ET pre-market
    - cron: '0  17 * * 1-5'   # 13:00 ET midday
    - cron: '30 19 * * 1-5'   # 15:30 ET near close

  workflow_dispatch:
    inputs:
      market:
        description: 'Market to scan: us / tw / all'
        required: false
        default: 'all'

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      # Python first (yfinance bulk-fetches OHLCV; Yahoo bans node-fetch but
      # allows yfinance's request pattern from GH Actions IPs)
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install yfinance pandas

      # Node second (consumes the pre-populated OHLCV cache)
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node deps
        run: npm install
        working-directory: scripts

      - name: Restore OHLCV cache
        uses: actions/cache@v4
        with:
          path: data/ohlcv_cache.json
          key: ohlcv-cache-shared

      # Step A: Python fetches OHLCV via yfinance (the only thing Yahoo lets through)
      - name: Fetch OHLCV via Python yfinance
        run: python scripts/fetch_ohlcv.py

      # Step B: Node scans using the cached data
      - name: Run US scan
        if: ${{ github.event.inputs.market != 'tw' }}
        run: node scripts/scan.js us

      - name: Run TW scan
        if: ${{ github.event.inputs.market != 'us' }}
        run: node scripts/scan.js tw

      # Step C: Python enriches leaders/discoveries with earnings, short
      # interest, analyst ratings, sector mapping — data Yahoo blocks for
      # node-fetch. Recomputes tripleResonance with these catalyst fields.
      - name: Enrich US scan
        if: ${{ github.event.inputs.market != 'tw' }}
        run: python scripts/enrich_quotes.py us
        continue-on-error: true

      # 2026-05-21 Tier 2-A: 美國國會議員交易（Capitol Trades）— Pelosi 等 buy 訊號
      - name: Fetch US politician trades (Capitol Trades)
        if: ${{ github.event.inputs.market != 'tw' }}
        run: python scripts/fetch_politician_trades.py
        continue-on-error: true

      # 2026-05-21 Tier 2-B: 散戶情緒（WSB / Stocktwits）
      - name: Fetch US retail sentiment (WSB + Stocktwits)
        if: ${{ github.event.inputs.market != 'tw' }}
        run: python scripts/fetch_retail_sentiment.py
        continue-on-error: true

      # 2026-05-21 Tier 2-C: Short Interest squeeze 候選
      - name: Fetch US short interest
        if: ${{ github.event.inputs.market != 'tw' }}
        run: python scripts/fetch_short_interest.py
        continue-on-error: true

      # 三大法人買賣超 (TWSE public API) — TW-specific institutional flow.
      # MUST run BEFORE enrich_quotes.py tw so that the Chinese 證券名稱 map
      # is available to enrich (yfinance returns English names for TW).
      - name: Fetch TW institutional buy/sell (三大法人)
        if: ${{ github.event.inputs.market != 'us' }}
        run: python scripts/fetch_twse_institutions.py
        continue-on-error: true

      - name: Enrich TW scan
        if: ${{ github.event.inputs.market != 'us' }}
        run: python scripts/enrich_quotes.py tw
        continue-on-error: true

      - name: Save OHLCV cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/ohlcv_cache.json
          key: ohlcv-cache-shared

      - name: Commit scan results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 2026-05-19: add files individually so missing tw_scan.json (when only US runs)
          # doesn't abort the whole add and skip us_scan.json staging.
          [ -f data/us_scan.json ] && git add data/us_scan.json || true
          [ -f data/tw_scan.json ] && git add data/tw_scan.json || true
          [ -f data/sector_cache.json ]    && git add data/sector_cache.json    || true
          [ -f data/quote_cache.json ]     && git add data/quote_cache.json     || true
          [ -f data/sector_radar.json ]    && git add data/sector_radar.json    || true
          [ -f data/tw_sector_radar.json ] && git add data/tw_sector_radar.json || true
          [ -f data/tw_institutions.json ]        && git add data/tw_institutions.json        || true
          [ -f data/tw_institutions_history.json ]&& git add data/tw_institutions_history.json|| true
          [ -f data/tw_name_map.json ]            && git add data/tw_name_map.json            || true
          [ -f data/ohlcv_lite.json ]      && git add data/ohlcv_lite.json      || true
          [ -f data/universe_memory.json ] && git add data/universe_memory.json || true
          [ -f data/universe_static.json ] && git add data/universe_static.json || true
          # 2026-05-21 Tier 2: 美股 chip 補強資料
          [ -f data/politician_trades.json ] && git add data/politician_trades.json || true
          [ -f data/retail_sentiment.json ]  && git add data/retail_sentiment.json  || true
          [ -f data/short_interest.json ]    && git add data/short_interest.json    || true
          git diff --cached --quiet || git commit -m "scan: $(date -u '+%Y-%m-%d %H:%M UTC')"
          for attempt in 1 2 3 4 5; do
            git pull --rebase --autostash 2>&1 | tail -2 || true
            if git push 2>&1; then echo "✅ push ok attempt $attempt"; break; fi
            sleep $((attempt * 2))
          done
