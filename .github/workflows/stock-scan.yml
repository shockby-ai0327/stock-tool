name: Stock RS Leader Scan

on:
  # Auto-run: 3x per trading day (US ET: pre-market, midday, near close)
  # Cron uses UTC — ET = UTC-4 (EDT)
  schedule:
    - cron: '25 13 * * 1-5'   # 09:25 ET (pre-market prep)
    - cron: '0  17 * * 1-5'   # 13:00 ET (midday refresh)
    - cron: '30 19 * * 1-5'   # 15:30 ET (near close)

  # Manual trigger from browser via GitHub API (on-demand rescan)
  workflow_dispatch:
    inputs:
      market:
        description: 'Market to scan (us / tw / all)'
        required: false
        default: 'all'

permissions:
  contents: write   # needed to commit scan results back to repo

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Install dependencies
        run: |
          cd scripts
          npm install

      - name: Run US scan
        if: ${{ github.event.inputs.market != 'tw' }}
        run: node scripts/scan.js us
        env:
          GITHUB_SCAN: 'true'

      - name: Run TW scan
        if: ${{ github.event.inputs.market != 'us' }}
        run: node scripts/scan.js tw
        env:
          GITHUB_SCAN: 'true'

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Only commit if there are changes
          git diff --cached --quiet || git commit -m "chore: auto scan $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
