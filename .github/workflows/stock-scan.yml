name: Stock RS Leader Scan

on:
  schedule:
    - cron: '25 13 * * 1-5'   # 09:25 ET pre-market
    - cron: '0  17 * * 1-5'   # 13:00 ET midday
    - cron: '30 19 * * 1-5'   # 15:30 ET near close

  workflow_dispatch:
    inputs:
      market:
        description: 'Market to scan: us / tw / all'
        required: false
        default: 'all'

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      # Python first (yfinance bulk-fetches OHLCV; Yahoo bans node-fetch but
      # allows yfinance's request pattern from GH Actions IPs)
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install yfinance pandas

      # Node second (consumes the pre-populated OHLCV cache)
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node deps
        run: npm install
        working-directory: scripts

      - name: Restore OHLCV cache
        uses: actions/cache@v4
        with:
          path: data/ohlcv_cache.json
          key: ohlcv-cache-shared

      # Step A: Python fetches OHLCV via yfinance (the only thing Yahoo lets through)
      - name: Fetch OHLCV via Python yfinance
        run: python scripts/fetch_ohlcv.py

      # Step B: Node scans using the cached data
      - name: Run US scan
        if: ${{ github.event.inputs.market != 'tw' }}
        run: node scripts/scan.js us

      - name: Run TW scan
        if: ${{ github.event.inputs.market != 'us' }}
        run: node scripts/scan.js tw

      # Step C: Python enriches leaders/discoveries with earnings, short
      # interest, analyst ratings, sector mapping — data Yahoo blocks for
      # node-fetch. Recomputes tripleResonance with these catalyst fields.
      - name: Enrich with quoteSummary via Python yfinance
        if: ${{ github.event.inputs.market != 'tw' }}
        run: python scripts/enrich_quotes.py
        continue-on-error: true  # don't fail whole scan if enrichment hiccups

      - name: Save OHLCV cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/ohlcv_cache.json
          key: ohlcv-cache-shared

      - name: Commit scan results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/us_scan.json data/tw_scan.json 2>/dev/null || true
          [ -f data/sector_cache.json ]    && git add data/sector_cache.json    || true
          [ -f data/quote_cache.json ]     && git add data/quote_cache.json     || true
          [ -f data/sector_radar.json ]    && git add data/sector_radar.json    || true
          [ -f data/universe_memory.json ] && git add data/universe_memory.json || true
          [ -f data/universe_static.json ] && git add data/universe_static.json || true
          git diff --cached --quiet || git commit -m "scan: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase --autostash || true
          git push
