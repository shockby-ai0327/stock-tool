name: Stock RS Leader Scan

on:
  # Auto-run: 3x per trading day (US ET: pre-market, midday, near close)
  # Cron uses UTC — EDT = UTC-4
  schedule:
    - cron: '25 13 * * 1-5'   # 09:25 ET pre-market
    - cron: '0  17 * * 1-5'   # 13:00 ET midday
    - cron: '30 19 * * 1-5'   # 15:30 ET near close

  # On-demand trigger from browser button via GitHub API
  workflow_dispatch:
    inputs:
      market:
        description: 'Market to scan: us / tw / all'
        required: false
        default: 'all'

permissions:
  contents: write   # write back scan results to data/

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch
        working-directory: scripts

      # Restore OHLCV cache from previous run (lives in GitHub Actions cache, not git)
      # Saves 60-80% of OHLCV API calls between scans on the same day
      - name: Restore OHLCV cache
        uses: actions/cache@v4
        with:
          path: data/ohlcv_cache.json
          key: ohlcv-cache-${{ github.run_id }}
          restore-keys: |
            ohlcv-cache-

      # Auto-retry on Yahoo IP ban (exit code 2). Up to 3 attempts with backoff.
      # Each retry inside same workflow run keeps the same IP, but actions/cache
      # and node_modules are warm so retry overhead is minimal. After 3 fails,
      # the run fails loudly and next cron triggers on a fresh runner.
      - name: Run US scan (with retry on IP ban)
        if: ${{ github.event.inputs.market != 'tw' }}
        run: |
          for attempt in 1 2 3; do
            echo "=== US scan attempt $attempt ==="
            if node scripts/scan.js us; then
              echo "✅ scan succeeded on attempt $attempt"
              exit 0
            else
              code=$?
              if [ $code -eq 2 ] && [ $attempt -lt 3 ]; then
                echo "⚠ Yahoo IP ban detected — waiting 90s before retry..."
                sleep 90
              else
                echo "❌ scan failed with exit code $code"
                exit $code
              fi
            fi
          done

      - name: Run TW scan
        if: ${{ github.event.inputs.market != 'us' }}
        run: node scripts/scan.js tw

      - name: Commit scan results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage scan outputs + caches/memory (auto-created on first run)
          # NOTE: ohlcv_cache.json is in .gitignore — too large for git, lives in
          # GitHub Actions cache between runs (see "Restore/Save OHLCV cache" steps).
          git add data/us_scan.json data/tw_scan.json
          [ -f data/sector_cache.json ]    && git add data/sector_cache.json    || true
          [ -f data/quote_cache.json ]     && git add data/quote_cache.json     || true
          [ -f data/universe_memory.json ] && git add data/universe_memory.json || true
          git diff --cached --quiet || git commit -m "scan: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
